map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 9222;

    location / {
        proxy_pass http://chrome:9222;
        proxy_set_header Host localhost;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Rewrite webSocketDebuggerUrl in the /json/* responses so the harness
        # connects back through this proxy (Host rewrite happens on the way in).
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter "ws://localhost/" "ws://cdp-proxy:9222/";
    }
}
